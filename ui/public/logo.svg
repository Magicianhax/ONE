<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Soft shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <!-- Radial gradient for background warmth -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#3DE88F"/>
      <stop offset="100%" stop-color="#2AB86A"/>
    </radialGradient>
    <!-- Hair gradient -->
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6040"/>
      <stop offset="100%" stop-color="#6B4226"/>
    </linearGradient>
    <!-- Skin gradient -->
    <radialGradient id="skinGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFE0BD"/>
      <stop offset="100%" stop-color="#F5C69A"/>
    </radialGradient>
    <!-- Eye shine -->
    <radialGradient id="eyeGrad" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#4AE898"/>
      <stop offset="100%" stop-color="#28B06E"/>
    </radialGradient>
    <!-- Shirt gradient -->
    <linearGradient id="shirtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCFF52"/>
      <stop offset="100%" stop-color="#E8EB30"/>
    </linearGradient>
    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCFF52"/>
      <stop offset="50%" stop-color="#35D07F"/>
      <stop offset="100%" stop-color="#28A065"/>
    </linearGradient>
  </defs>

  <!-- Outer circular badge ring -->
  <circle cx="100" cy="100" r="97" fill="url(#ringGrad)"/>
  <circle cx="100" cy="100" r="90" fill="url(#bgGrad)"/>

  <!-- Inner subtle pattern - decorative dots -->
  <circle cx="45" cy="45" r="3" fill="#4AE898" opacity="0.3"/>
  <circle cx="155" cy="50" r="2.5" fill="#4AE898" opacity="0.25"/>
  <circle cx="40" cy="155" r="2" fill="#FCFF52" opacity="0.3"/>
  <circle cx="160" cy="148" r="2.5" fill="#FCFF52" opacity="0.25"/>
  <circle cx="100" cy="30" r="2" fill="#fff" opacity="0.2"/>

  <!-- Body / Shirt - visible below the head -->
  <g filter="url(#shadow)">
    <!-- Neck -->
    <rect x="88" y="138" width="24" height="14" rx="4" fill="url(#skinGrad)"/>

    <!-- Shirt / shoulders -->
    <path d="M58 168 Q58 148 78 144 L88 148 L100 152 L112 148 L122 144 Q142 148 142 168 L142 185 Q142 192 135 192 L65 192 Q58 192 58 185 Z" fill="url(#shirtGrad)" stroke="#D4D720" stroke-width="1"/>

    <!-- Shirt collar V -->
    <path d="M88 148 L100 162 L112 148" fill="none" stroke="#D4D720" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Tiny Celo logo on shirt (a simple circle) -->
    <circle cx="100" cy="174" r="6" fill="none" stroke="#35D07F" stroke-width="1.5"/>
    <circle cx="100" cy="174" r="2.5" fill="#35D07F"/>
  </g>

  <!-- Head group -->
  <g filter="url(#shadow)">
    <!-- Head shape - slightly oval, kawaii proportions -->
    <ellipse cx="100" cy="100" rx="42" ry="44" fill="url(#skinGrad)"/>

    <!-- Ears -->
    <ellipse cx="57" cy="102" rx="7" ry="9" fill="#F5C69A"/>
    <ellipse cx="57" cy="102" rx="4" ry="6" fill="#FFD6B0"/>
    <ellipse cx="143" cy="102" rx="7" ry="9" fill="#F5C69A"/>
    <ellipse cx="143" cy="102" rx="4" ry="6" fill="#FFD6B0"/>

    <!-- Hair - fluffy, layered look -->
    <!-- Back hair volume -->
    <ellipse cx="100" cy="72" rx="46" ry="32" fill="url(#hairGrad)"/>
    <!-- Hair tufts on top -->
    <path d="M68 78 Q62 55 72 50 Q78 48 82 58" fill="#7A5234"/>
    <path d="M82 68 Q80 42 92 38 Q100 36 100 50" fill="url(#hairGrad)"/>
    <path d="M100 50 Q100 36 108 38 Q120 42 118 68" fill="url(#hairGrad)"/>
    <path d="M118 58 Q122 48 128 50 Q138 55 132 78" fill="#7A5234"/>
    <!-- Bangs -->
    <path d="M65 85 Q68 70 80 72 Q85 73 88 80 Q90 72 100 70 Q110 72 112 80 Q115 73 120 72 Q132 70 135 85 Q130 78 120 80 Q112 82 108 88 Q104 80 100 78 Q96 80 92 88 Q88 82 80 80 Q70 78 65 85 Z" fill="url(#hairGrad)"/>
    <!-- Side hair wisps -->
    <path d="M60 88 Q55 80 62 75 Q66 73 68 80 Q65 85 60 88" fill="#7A5234"/>
    <path d="M140 88 Q145 80 138 75 Q134 73 132 80 Q135 85 140 88" fill="#7A5234"/>

    <!-- Eyes - big, expressive, kawaii style -->
    <!-- Left eye -->
    <ellipse cx="82" cy="105" rx="11" ry="12" fill="#fff"/>
    <ellipse cx="84" cy="106" rx="8" ry="9" fill="url(#eyeGrad)"/>
    <ellipse cx="84" cy="106" rx="5" ry="6" fill="#1A7A48"/>
    <circle cx="84" cy="106" r="3" fill="#0D4D2D"/>
    <!-- Left eye shine -->
    <circle cx="88" cy="102" r="3" fill="#fff" opacity="0.9"/>
    <circle cx="82" cy="108" r="1.5" fill="#fff" opacity="0.5"/>
    <!-- Left eyelashes -->
    <path d="M72 96 Q74 93 77 95" fill="none" stroke="#5A3A1A" stroke-width="1" stroke-linecap="round"/>
    <path d="M75 94 Q78 92 80 94" fill="none" stroke="#5A3A1A" stroke-width="0.8" stroke-linecap="round"/>

    <!-- Right eye -->
    <ellipse cx="118" cy="105" rx="11" ry="12" fill="#fff"/>
    <ellipse cx="116" cy="106" rx="8" ry="9" fill="url(#eyeGrad)"/>
    <ellipse cx="116" cy="106" rx="5" ry="6" fill="#1A7A48"/>
    <circle cx="116" cy="106" r="3" fill="#0D4D2D"/>
    <!-- Right eye shine -->
    <circle cx="120" cy="102" r="3" fill="#fff" opacity="0.9"/>
    <circle cx="114" cy="108" r="1.5" fill="#fff" opacity="0.5"/>
    <!-- Right eyelashes -->
    <path d="M123 95 Q126 93 128 96" fill="none" stroke="#5A3A1A" stroke-width="1" stroke-linecap="round"/>
    <path d="M120 94 Q122 92 125 94" fill="none" stroke="#5A3A1A" stroke-width="0.8" stroke-linecap="round"/>

    <!-- Eyebrows - soft and friendly -->
    <path d="M73 92 Q80 87 90 90" fill="none" stroke="#6B4226" stroke-width="2" stroke-linecap="round"/>
    <path d="M110 90 Q120 87 127 92" fill="none" stroke="#6B4226" stroke-width="2" stroke-linecap="round"/>

    <!-- Nose - tiny cute dot -->
    <ellipse cx="100" cy="115" rx="2.5" ry="2" fill="#E8B88A"/>

    <!-- Mouth - friendly smile -->
    <path d="M89 122 Q95 130 100 130 Q105 130 111 122" fill="none" stroke="#C47A5A" stroke-width="2" stroke-linecap="round"/>
    <!-- Smile highlight -->
    <path d="M93 124 Q97 128 100 128 Q103 128 107 124" fill="#F5A0A0" opacity="0.4"/>

    <!-- Blush cheeks - kawaii style -->
    <ellipse cx="72" cy="118" rx="8" ry="5" fill="#FFB0B0" opacity="0.4"/>
    <ellipse cx="128" cy="118" rx="8" ry="5" fill="#FFB0B0" opacity="0.4"/>
  </g>

  <!-- "ONE" text at bottom of badge -->
  <text x="100" y="16" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="14" fill="#fff" opacity="0.9" letter-spacing="3">ONE</text>
</svg>